<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cham Archiver</title>
    <style>
      body {
        font:
          13px system-ui,
          sans-serif;
        width: 280px;
        padding: 12px;
        margin: 0;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 6px;
      }
      .url {
        color: #666;
        word-break: break-all;
        margin-bottom: 10px;
        font-size: 12px;
      }
      button {
        display: block;
        width: 100%;
        padding: 6px 8px;
        margin-top: 6px;
        cursor: pointer;
        font: inherit;
      }
      .status {
        margin-top: 8px;
        font-size: 12px;
      }
      .ok {
        color: #197d3a;
      }
      .err {
        color: #b00020;
      }
    </style>
  </head>
  <body>
    <h1>Cham Archiver</h1>
    <div class="url" id="url">…</div>
    <button id="archive">Archive this page</button>
    <button id="always">Always archive this domain</button>
    <button id="never">Never archive this domain</button>
    <div class="status" id="status"></div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
